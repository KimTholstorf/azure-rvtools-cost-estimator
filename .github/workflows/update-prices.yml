name: Update web pricing data

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package and dependencies
        run: pip install -e .

      - name: Fetch pricing data for all regions
        run: python scripts/fetch_web_prices.py

      - name: Commit updated price files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/prices/
          git diff --staged --quiet && echo "No price changes." || (
            git commit -m "chore: update Azure web pricing data $(date -u '+%Y-%m-%d')"
            git push
          )
